<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entraînement — Exos Pièges</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0c0c14; --s:#13131f; --s2:#1a1a2e; --b:rgba(255,255,255,0.07);
  --text:#e8e8f0; --muted:#6b6b8a;
  --r:#ff6b6b; --g:#3dd68c; --y:#fbbf24; --p:#a78bfa; --bl:#38bdf8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);padding:20px 16px 80px;}
.wrap{max-width:740px;margin:0 auto;}

h1{font-size:1.6rem;font-weight:700;margin-bottom:4px;}
.sub{color:var(–muted);font-size:0.88rem;margin-bottom:28px;}

/* progress */
.progress-wrap{background:var(–s2);border-radius:999px;height:8px;margin-bottom:28px;overflow:hidden;}
.progress-bar{height:100%;background:linear-gradient(90deg,var(–p),var(–bl));border-radius:999px;transition:width 0.4s;width:0%;}
.score-txt{font-size:0.8rem;color:var(–muted);text-align:right;margin-top:6px;}

/* exo card */
.exo{
background:var(–s);border:1px solid var(–b);
border-radius:18px;margin-bottom:16px;overflow:hidden;
transition:border-color 0.3s;
}
.exo.correct{border-color:rgba(61,214,140,0.4);}
.exo.wrong{border-color:rgba(255,107,107,0.4);}
.exo.revealed{border-color:rgba(167,139,250,0.3);}

.exo-head{padding:18px 20px;}
.exo-meta{
display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;
}
.tag{
padding:3px 10px;border-radius:6px;font-size:0.72rem;font-weight:700;
text-transform:uppercase;letter-spacing:0.5px;
}
.tag-piege{background:rgba(255,107,107,0.15);color:var(–r);}
.tag-long{background:rgba(251,191,36,0.15);color:var(–y);}
.tag-mix{background:rgba(167,139,250,0.15);color:var(–p);}
.tag-tricky{background:rgba(56,189,248,0.15);color:var(–bl);}
.tag-hard{background:rgba(255,107,107,0.2);color:var(–r);border:1px solid var(–r);}

.exo-q{font-size:0.95rem;font-weight:600;line-height:1.6;margin-bottom:14px;}
.exo-q code{
font-family:‘DM Mono’,monospace;font-size:0.88rem;
background:rgba(255,255,255,0.08);padding:2px 8px;border-radius:5px;
}

/* input zone */
.input-zone{display:flex;gap:10px;flex-wrap:wrap;}
.opt-btn{
padding:9px 16px;border-radius:10px;border:1.5px solid var(–b);
background:var(–s2);color:var(–text);font-size:0.88rem;font-weight:600;
cursor:pointer;transition:all 0.2s;font-family:‘DM Sans’,sans-serif;
}
.opt-btn:hover{border-color:var(–p);color:var(–p);}
.opt-btn.selected{border-color:var(–p);background:rgba(167,139,250,0.1);color:var(–p);}
.opt-btn.correct-ans{border-color:var(–g);background:rgba(61,214,140,0.1);color:var(–g);}
.opt-btn.wrong-ans{border-color:var(–r);background:rgba(255,107,107,0.1);color:var(–r);}
.opt-btn:disabled{cursor:default;}

.free-input{
width:100%;padding:10px 14px;border-radius:10px;
background:var(–s2);border:1.5px solid var(–b);
color:var(–text);font-size:0.9rem;font-family:‘DM Mono’,monospace;
outline:none;transition:border-color 0.2s;
}
.free-input:focus{border-color:var(–p);}
.free-input.correct-input{border-color:var(–g);}
.free-input.wrong-input{border-color:var(–r);}

.action-row{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;align-items:center;}
.btn{
padding:9px 20px;border-radius:10px;font-size:0.85rem;font-weight:700;
cursor:pointer;border:none;transition:all 0.2s;font-family:‘DM Sans’,sans-serif;
}
.btn-primary{background:var(–p);color:#000;}
.btn-primary:hover{opacity:0.85;}
.btn-reveal{background:var(–s2);color:var(–muted);border:1px solid var(–b);}
.btn-reveal:hover{color:var(–text);}
.btn:disabled{opacity:0.4;cursor:default;}

/* correction */
.correction{
display:none;padding:16px 20px;
border-top:1px solid var(–b);
background:rgba(167,139,250,0.04);
}
.correction.show{display:block;}
.corr-title{
font-size:0.75rem;text-transform:uppercase;letter-spacing:0.8px;
font-weight:700;margin-bottom:10px;
}
.corr-title.ok{color:var(–g);}
.corr-title.ko{color:var(–r);}
.corr-title.info{color:var(–p);}
.corr-body{font-size:0.88rem;line-height:1.8;}
.corr-body pre{
font-family:‘DM Mono’,monospace;font-size:0.82rem;
background:rgba(255,255,255,0.04);padding:12px;border-radius:8px;
margin:8px 0;white-space:pre-wrap;line-height:1.8;
}
.corr-body .k{color:var(–p);}
.corr-body .v{color:var(–g);}
.corr-body .e{color:var(–r);}
.corr-body .s{color:var(–y);}
.corr-body .c{color:var(–muted);}
.piege-box{
background:rgba(255,107,107,0.08);border:1px solid rgba(255,107,107,0.2);
border-radius:8px;padding:10px 14px;margin-top:8px;
font-size:0.84rem;color:#ffd0d0;
}

/* final */
.final{
display:none;text-align:center;padding:40px 20px;
background:var(–s);border:1px solid var(–b);border-radius:18px;margin-top:20px;
}
.final.show{display:block;}
.final-score{font-size:3rem;font-weight:700;margin-bottom:8px;}
.final-msg{color:var(–muted);font-size:1rem;margin-bottom:20px;}
.restart-btn{
padding:12px 28px;border-radius:12px;background:var(–p);color:#000;
font-weight:700;border:none;cursor:pointer;font-size:0.95rem;
}
</style>

</head>
<body>
<div class="wrap">

<h1>⚡ Entraînement Anti-Piège</h1>
<p class="sub">Les exos que ton prof va sortir — mélangés, longs, pièges, questions floues</p>

<div class="progress-wrap"><div class="progress-bar" id="pbar"></div></div>
<div class="score-txt" id="score-txt">0 / 0 répondus</div>

<div id="exos-container"></div>
<div class="final" id="final">
  <div class="final-score" id="final-score"></div>
  <div class="final-msg" id="final-msg"></div>
  <button class="restart-btn" onclick="location.reload()">🔄 Recommencer</button>
</div>

</div>
<script>
const EXOS = [
  {
    tags:['piege','parité'],
    q: "f(x) = 3x² − 7. Quelle est la parité de f ?",
    type:'mcq',
    opts:['Paire','Impaire','Ni paire ni impaire'],
    ans:0,
    corr:`<pre><span class="k">f(−x)</span> = 3(−x)² − 7
     = 3x² − 7
     = <span class="v">f(x)</span>
Donc <span class="v">f est PAIRE ✓</span></pre>
<div class="piege-box">⚠️ Piège : le −7 est une constante, il change pas au signe. Seul le x² compte → exposant pair → paire.</div>`
  },
  {
    tags:['piege','parité'],
    q: "f(x) = x³ + x. Quelle est la parité de f ?",
    type:'mcq',
    opts:['Paire','Impaire','Ni paire ni impaire'],
    ans:1,
    corr:`<pre><span class="k">f(−x)</span> = (−x)³ + (−x)
     = −x³ − x
     = −(x³ + x)
     = <span class="v">−f(x)</span>
Donc <span class="v">f est IMPAIRE ✓</span></pre>
<div class="piege-box">⚠️ Tous les termes ont un exposant impair (3 et 1) → impaire automatiquement.</div>`
  },
  {
    tags:['piege','parité'],
    q: "f(x) = x² + x. Quelle est la parité de f ? (question piège classique de prof)",
    type:'mcq',
    opts:['Paire','Impaire','Ni paire ni impaire'],
    ans:2,
    corr:`<pre><span class="k">f(−x)</span> = (−x)² + (−x) = x² − x

<span class="c">Test paire : f(−x) = f(x) ?</span>
x² − x ≠ x² + x  → <span class="e">pas paire</span>

<span class="c">Test impaire : f(−x) = −f(x) ?</span>
−f(x) = −x² − x
x² − x ≠ −x² − x → <span class="e">pas impaire</span>

<span class="v">Donc f est ni paire ni impaire ✓</span></pre>

<div class="piege-box">⚠️ Piège classique : mélange x² (pair) et x (impair) dans la même fonction → ni/ni forcément.</div>`
  },
  {
    tags:['piege','racine'],
    q: "Vrai ou faux : √(x²) = x",
    type:'mcq',
    opts:['Vrai','Faux, √(x²) = |x|','Faux, √(x²) = −x'],
    ans:1,
    corr:`<pre><span class="e">FAUX.</span>  √(x²) = <span class="v">|x|</span>

Exemple : x = −3
√((−3)²) = √9 = 3 ≠ −3</pre>

<div class="piege-box">⚠️ Le piège N°1. Si x est négatif, √(x²) donne un positif, pas x. Toujours écrire |x|.</div>`
  },
  {
    tags:['mix','long'],
    q: "f est définie sur ℝ par f(x) = 2x⁴ − x². Démontrer que f est paire.",
    type:'free',
    placeholder:"Écris f(−x) = ...",
    checkFn: v => v.toLowerCase().includes('f(-x)') && v.includes('f(x)') || v.toLowerCase().includes('paire'),
    corr:`<pre><span class="k">f(−x)</span> = 2(−x)⁴ − (−x)²
     = 2x⁴ − x²
     = <span class="v">f(x)</span>
Donc f(−x) = f(x), <span class="v">f est paire ✓</span></pre>
<div class="piege-box">⚠️ x⁴ → exposant pair → (−x)⁴ = x⁴. Même logique que x².</div>`
  },
  {
    tags:['piege','inéquation'],
    q: "Résoudre x² < 9. Quelle est la bonne réponse ?",
    type:'mcq',
    opts:['x < 3','x < −3 ou x > 3','−3 < x < 3','x > −3'],
    ans:2,
    corr:`<pre>x² < 9 = 3²
→ <span class="v">−3 < x < 3</span>
S = ]−3 ; 3[</pre>
<div class="piege-box">⚠️ x² &lt; k² → les solutions sont ENTRE −k et k. Erreur fréquente : écrire juste "x &lt; 3".</div>`
  },
  {
    tags:['piege','inéquation'],
    q: "Résoudre x² > 16. Quelle est la bonne réponse ?",
    type:'mcq',
    opts:['−4 < x < 4','x < −4 ou x > 4','x > 4','x < 4'],
    ans:1,
    corr:`<pre>x² > 16 = 4²
→ <span class="v">x < −4  ou  x > 4</span>
S = ]−∞;−4[ ∪ ]4;+∞[</pre>
<div class="piege-box">⚠️ x² &gt; k² → les solutions sont À L'EXTÉRIEUR de [−k;k]. L'opposé de &lt;.</div>`
  },
  {
    tags:['mix','long','piege'],
    q: "Résoudre 3x² − 12 > 0. Donne l'ensemble de solutions.",
    type:'free',
    placeholder:"S = ...",
    checkFn: v => (v.includes('-2') && v.includes('2')) && (v.includes('∪') || v.toLowerCase().includes('ou') || v.includes('U')),
    corr:`<pre>3x² − 12 > 0
3x² > 12
x² > 4
→ <span class="v">x < −2  ou  x > 2</span>
S = ]−∞;−2[ ∪ ]2;+∞[</pre>`
  },
  {
    tags:['mix','piege'],
    q: "f(x) = 1/x. On a f(−3) = ?",
    type:'mcq',
    opts:['3','−3','−1/3','1/3'],
    ans:2,
    corr:`<pre>f(−3) = 1/(−3) = <span class="v">−1/3</span></pre>
<div class="piege-box">⚠️ 1/x est impaire : f(−x) = −f(x). Donc f(−3) = −f(3) = −1/3.</div>`
  },
  {
    tags:['piege','comparaison'],
    q: "f(x) = x². Comparer f(−5) et f(3). Qui est le plus grand ?",
    type:'mcq',
    opts:['f(−5) < f(3)','f(−5) = f(3)','f(−5) > f(3)','Impossible à savoir sans calculer'],
    ans:2,
    corr:`<pre>f paire → f(−5) = f(5)
5 > 3 et f ↗ sur [0;+∞[
→ f(5) > f(3)
→ <span class="v">f(−5) > f(3) ✓</span>  (25 > 9)</pre>
<div class="piege-box">⚠️ Piège : −5 est négatif mais f est paire donc f(−5) = f(5). Comparer f(5) et f(3) sur [0;+∞[ où f est croissante.</div>`
  },
  {
    tags:['long','mix'],
    q: "Résoudre (x+1)² ≤ 4. Donne l'ensemble solution.",
    type:'free',
    placeholder:"S = ...",
    checkFn: v => v.includes('-3') && v.includes('1') && !v.includes('-3)') || v.includes(']-3') || v.includes('[-3'),
    corr:`<pre>(x+1)² ≤ 4
(x+1)² ≤ 2²
→ <span class="v">−2 ≤ x+1 ≤ 2</span>
→ −2−1 ≤ x ≤ 2−1
→ <span class="v">−3 ≤ x ≤ 1</span>
S = [−3 ; 1]</pre>
<div class="piege-box">⚠️ Poser u = x+1, résoudre u² ≤ 4 → −2 ≤ u ≤ 2, puis revenir à x.</div>`
  },
  {
    tags:['piege','inverse'],
    q: "1/x est décroissante sur ℝ*. Vrai ou Faux ?",
    type:'mcq',
    opts:['Vrai','Faux'],
    ans:1,
    corr:`<pre><span class="e">FAUX.</span>

1/x est décroissante sur <span class="v">]−∞;0[</span>
et décroissante sur <span class="v">]0;+∞[</span>
mais <span class="e">PAS sur ℝ* entier</span>.

Contre-exemple :
−1 < 1  mais  f(−1) = −1 < 1 = f(1)
→ l’ordre n’est pas inversé → pas décroissante sur ℝ*</pre>

<div class="piege-box">⚠️ Piège ultra classique de prof. Toujours préciser l'intervalle !</div>`
  },
  {
    tags:['mix','long','piege'],
    q: "f(x) = x³ − x. \n1) f est-elle paire, impaire, ou ni l'un ni l'autre ?\n2) f est-elle croissante sur ℝ ?",
    type:'free',
    placeholder:"1) ... car f(−x) = ...    2) ...",
    checkFn: v => v.toLowerCase().includes('impaire') && (v.toLowerCase().includes('non') || v.toLowerCase().includes('pas') || v.toLowerCase().includes('faux')),
    corr:`<pre><span class="c">1) Parité :</span>
f(−x) = (−x)³ − (−x) = −x³ + x = −(x³−x) = <span class="v">−f(x)</span>
→ <span class="v">f est IMPAIRE</span>

<span class="c">2) Monotonie :</span>
f(0) = 0
f(2) = 8−2 = 6  → f(0) < f(2) ✓
f(−1) = −1+1 = 0 = f(0)
<span class="e">→ f n’est PAS strictement croissante sur ℝ</span>
(elle “s’aplatit” autour de x=0)</pre>

<div class="piege-box">⚠️ Une fonction impaire peut ne pas être croissante sur ℝ. Ne pas confondre parité et monotonie.</div>`
  },
  {
    tags:['piege','racine'],
    q: "Résoudre √x = −2",
    type:'mcq',
    opts:['x = 4','x = −4','Pas de solution','x = ±2'],
    ans:2,
    corr:`<pre>√x ≥ 0 toujours.
−2 < 0, donc <span class="v">pas de solution. S = ∅</span></pre>
<div class="piege-box">⚠️ La racine carrée est toujours positive ou nulle. Elle ne peut jamais valoir un nombre négatif.</div>`
  },
  {
    tags:['long','mix'],
    q: "Résoudre √(2x+1) > 3. Précise d'abord la condition d'existence.",
    type:'free',
    placeholder:"Condition : ...   Résolution : ...",
    checkFn: v => v.includes('4') && (v.includes('x >') || v.includes('x>')),
    corr:`<pre><span class="c">Condition d'existence :</span>
2x+1 ≥ 0 → x ≥ −1/2

<span class="c">Résolution :</span>
√(2x+1) > 3
2x+1 > 9   <span class="c">(√ croissante, on met au carré)</span>
2x > 8
<span class="v">x > 4</span>

<span class="c">Intersection avec condition :</span>
x > 4 (et x ≥ −1/2 déjà vérifié)
<span class="v">S = ]4 ; +∞[</span></pre>

<div class="piege-box">⚠️ Toujours vérifier la condition d'existence quand il y a √. Ici √(2x+1) impose 2x+1 ≥ 0.</div>`
  },
  {
    tags:['piege','comparaison'],
    q: "Comparer 1/5 et 1/3. Utilise les variations de 1/x.",
    type:'mcq',
    opts:['1/5 > 1/3','1/5 = 1/3','1/5 < 1/3'],
    ans:2,
    corr:`<pre>0 < 3 < 5 (faux, c'est 0 < 3 < 5... attends)
0 < 3 < 5

1/x est <span class="v">décroissante</span> sur ]0;+∞[
3 < 5 → 1/3 > 1/5
→ <span class="v">1/5 < 1/3 ✓</span></pre>

<div class="piege-box">⚠️ 1/x décroissante = plus x est grand, plus 1/x est petit. 5 > 3 donc 1/5 < 1/3.</div>`
  }
];

let answered = 0, correct = 0;

function updateProgress(){
const pct = (answered/EXOS.length)*100;
document.getElementById(‘pbar’).style.width = pct+’%’;
document.getElementById(‘score-txt’).textContent = `${answered} / ${EXOS.length} répondus — ${correct} corrects`;
if(answered === EXOS.length) showFinal();
}

function showFinal(){
const f = document.getElementById(‘final’);
const pct = Math.round((correct/EXOS.length)*100);
document.getElementById(‘final-score’).textContent = `${correct}/${EXOS.length} — ${pct}%`;
let msg = pct>=80 ? ‘🔥 Solide. Tu vas gérer l'éval.’ : pct>=50 ? ‘👍 Bien. Revois les pièges marqués ⚠️.’ : ‘💪 Continue — relis les corrections et recommence.’;
document.getElementById(‘final-msg’).textContent = msg;
f.classList.add(‘show’);
}

function renderExos(){
const container = document.getElementById(‘exos-container’);
EXOS.forEach((ex,i)=>{
const div = document.createElement(‘div’);
div.className = ‘exo’;
div.id = ‘exo-’+i;

```
const tagsHtml = ex.tags.map(t=>{
  const cls = t==='piege'?'tag-piege':t==='long'?'tag-long':t==='mix'?'tag-mix':'tag-tricky';
  const label = t==='piege'?'⚠️ Piège':t==='long'?'📏 Long':t==='mix'?'🔀 Mix':t;
  return `<span class="tag ${cls}">${label}</span>`;
}).join('');

let inputHtml = '';
if(ex.type==='mcq'){
  inputHtml = `<div class="input-zone" id="opts-${i}">
    ${ex.opts.map((o,j)=>`<button class="opt-btn" onclick="selectOpt(${i},${j})">${o}</button>`).join('')}
  </div>`;
} else {
  inputHtml = `<div class="input-zone">
    <input class="free-input" id="inp-${i}" placeholder="${ex.placeholder}" />
  </div>`;
}

div.innerHTML = `
  <div class="exo-head">
    <div class="exo-meta">
      <span style="font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--muted)">N°${i+1}</span>
      ${tagsHtml}
    </div>
    <div class="exo-q">${ex.q.replace(/\n/g,'<br>')}</div>
    ${inputHtml}
    <div class="action-row">
      ${ex.type==='free'?`<button class="btn btn-primary" id="btn-${i}" onclick="checkFree(${i})">Valider</button>`:''}
      <button class="btn btn-reveal" id="reveal-${i}" onclick="reveal(${i})">Voir la correction</button>
    </div>
  </div>
  <div class="correction" id="corr-${i}">
    <div class="corr-title info" id="corr-title-${i}">💡 Correction</div>
    <div class="corr-body">${ex.corr}</div>
  </div>`;
container.appendChild(div);
```

});
}

function selectOpt(i, j){
const ex = EXOS[i];
const exo = document.getElementById(‘exo-’+i);
if(exo.dataset.done) return;
exo.dataset.done = ‘1’;

const opts = document.querySelectorAll(`#opts-${i} .opt-btn`);
opts.forEach(b=>b.disabled=true);
opts[j].classList.add(j===ex.ans?‘correct-ans’:‘wrong-ans’);
if(j!==ex.ans) opts[ex.ans].classList.add(‘correct-ans’);

const isCorrect = j===ex.ans;
if(isCorrect){correct++;exo.classList.add(‘correct’);}
else exo.classList.add(‘wrong’);

answered++;
updateProgress();
reveal(i, isCorrect);
}

function checkFree(i){
const ex = EXOS[i];
const exo = document.getElementById(‘exo-’+i);
if(exo.dataset.done) return;
const inp = document.getElementById(‘inp-’+i);
const val = inp.value.trim();
if(!val) return;
exo.dataset.done=‘1’;
document.getElementById(‘btn-’+i).disabled=true;
inp.disabled=true;

const isCorrect = ex.checkFn(val);
inp.classList.add(isCorrect?‘correct-input’:‘wrong-input’);
if(isCorrect){correct++;exo.classList.add(‘correct’);}
else exo.classList.add(‘wrong’);
answered++;
updateProgress();
reveal(i, isCorrect);
}

function reveal(i, isCorrect){
const corr = document.getElementById(‘corr-’+i);
const title = document.getElementById(‘corr-title-’+i);
const exo = document.getElementById(‘exo-’+i);
corr.classList.add(‘show’);
exo.classList.add(‘revealed’);
if(isCorrect===true){title.textContent=‘✅ Correct !’;title.className=‘corr-title ok’;}
else if(isCorrect===false){title.textContent=‘❌ Faux — Correction :’;title.className=‘corr-title ko’;}
else{title.textContent=‘💡 Correction’;title.className=‘corr-title info’;}

// mark as done if just reveal
if(!document.getElementById(‘exo-’+i).dataset.done){
document.getElementById(‘exo-’+i).dataset.done=‘1’;
const btn=document.getElementById(‘btn-’+i);
if(btn)btn.disabled=true;
